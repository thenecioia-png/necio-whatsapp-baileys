app = "necio-whatsapp-bot-v3"
primary_region = "dfw"

[build]

[env]
  PORT = "3002"
  NODE_ENV = "production"

[mounts]
  source = "necio_whatsapp_data"
  destination = "/app/auth_info_baileys"

[[services]]
  internal_port = 3002
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
