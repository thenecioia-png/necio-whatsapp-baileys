name: Keep Alive Bot

on:
  schedule:
    - cron: '*/4 * * * *'  # Cada 4 minutos (más frecuente para evitar dormir)
  workflow_dispatch:

jobs:
  ping-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (mantiene servidor despierto)
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://necio-whatsapp-bot-v3.fly.dev/health)
          echo "[/health] HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Health endpoint returned $HTTP_CODE"
          fi

      - name: Ping raiz / (trafico adicional para Fly.io)
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://necio-whatsapp-bot-v3.fly.dev/)
          echo "[/] HTTP Status: $HTTP_CODE"

      - name: Ping /status (verifica WhatsApp conectado)
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://necio-whatsapp-bot-v3.fly.dev/status)
          echo "[/status] HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::WhatsApp appears disconnected (status: $HTTP_CODE)"
          fi
