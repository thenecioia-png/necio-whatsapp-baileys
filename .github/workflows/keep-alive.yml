name: Keep Alive Render

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl -sS -o /dev/null -w "%{http_code}\n" \
            https://necio-whatsapp-bot.onrender.com/health
